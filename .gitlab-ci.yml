stages:
  - build
  - deploy

build-frontend:
  stage: build
  image: docker:29.4.0
  services:
    - docker:29.4.0-dind
  variables:
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $CI_REGISTRY
  script:
    - docker build -t registry.gitlab.com/iitpl/ssbd/2026/01/web:latest .
    - docker push registry.gitlab.com/iitpl/ssbd/2026/01/web:latest
  only:
    - main

deploy-frontend:
  stage: deploy
  tags:
    - ovirt-runner
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $CI_REGISTRY
  script:
    - cd /opt/api
    - docker compose -f docker-compose.prod.yml pull frontend
    - docker compose -f docker-compose.prod.yml up -d
  only:
    - main
